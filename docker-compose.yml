services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketrush-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ticketrush
      POSTGRES_PASSWORD: ticketrush
      POSTGRES_DB: ticketrush
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketrush -d ticketrush"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ticketrush-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
